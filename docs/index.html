        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* 스크롤바 */
        ::-webkit-scrollbar { width: 6px; }

        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

        /* 네비 버튼 hover */
        .nav-btn:hover { background: rgba(255,77,0,0.2) !important; color: #ff4d00 !important; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

        /* 카드 hover */
        .product-card { transition: transform 0.2s, box-shadow 0.2s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 8px 24px rgba(0,0,0,0.12) !important; }

        /* 버튼 hover 효과 */
        .btn-primary:hover { background: #222 !important; }
        .btn-primary-red:hover { background: #cc3d00 !important; }
        .btn-outline:hover { background: #f5f5f5 !important; }

        /* 토글 트랜지션 */
        .toggle-thumb { transition: left 0.2s ease; }
        .toggle-track { transition: background 0.2s ease; }

        /* 쿠폰 그라디언트 shine 효과 */
        .coupon-card { position: relative; overflow: hidden; }
        .coupon-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 40%;
            height: 200%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.08), transparent);
            transform: skewX(-20deg);
            animation: shine 3s infinite;
        }
        @keyframes shine { 0% { left: -60%; } 100% { left: 120%; } }

        /* 대기열 로그 커서 깜빡임 */
        .log-cursor { animation: blink 1s infinite; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

        /* 진행바 애니메이션 */
        .progress-bar { animation: progressPulse 2s ease-in-out infinite; }
        @keyframes progressPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }

        /* 체크박스 커스텀 */
        .custom-check {
            width: 18px; height: 18px; border-radius: 4px;
            border: 2px solid #ddd; background: #fff;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.15s; flex-shrink: 0;
        }
        .custom-check.checked { background: #0a0a0a; border-color: #0a0a0a; }
        .custom-check.checked::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 900; }

        /* 사이즈 버튼 */
        .size-btn { transition: all 0.1s; }
        .size-btn:hover:not(.disabled) { border-color: #0a0a0a !important; }
        .size-btn.selected { border: 2px solid #0a0a0a !important; font-weight: 700; }
        .size-btn.disabled { background: #f5f5f5 !important; color: #ccc !important; cursor: not-allowed !important; }

        /* 결제수단 카드 */
        .pay-card { transition: all 0.15s; cursor: pointer; }
        .pay-card:hover { background: #f9f9f9 !important; }
        .pay-card.selected { border: 2px solid #0a0a0a !important; background: #f9f9f9 !important; }

        /* 쿠폰 타입 버튼 */
        .type-btn { transition: all 0.15s; }

        /* 소셜 로그인 버튼 */
        .social-btn { transition: filter 0.15s; }
        .social-btn:hover { filter: brightness(0.95); }

        /* 섹션 fade-in */
        .screen-wrap { animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* 품절 배지 pulse */
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }

        /* 반응형 */
        /* ── 슬라이더 ── */
        .slider-wrap { position: relative; overflow: hidden; height: 480px; }
        @media (max-width: 768px) { .slider-wrap { height: 360px; } }

        .slide {
            position: absolute; inset: 0;
            opacity: 0;
            transform: translateX(60px);
            transition: opacity 0.7s cubic-bezier(.4,0,.2,1), transform 0.7s cubic-bezier(.4,0,.2,1);
            pointer-events: none;
        }
        .slide.active {
            opacity: 1; transform: translateX(0); pointer-events: auto;
        }
        .slide.exit {
            opacity: 0; transform: translateX(-60px);
        }

        .badge-REVIEW  { background: rgba(245,158,11,0.2);  color: #fcd34d; }

        /* 슬라이더 도트 */
        .dot { width:8px; height:8px; border-radius:999px; background:#333; border:none; cursor:pointer; padding:0; transition: all 0.3s; flex-shrink:0; }
        .dot.active { width:24px; background:#ff4d00; }
        .dot:hover:not(.active) { background:#555; }

        /* 진행바 */
        .slide-progress { height:2px; background:#1a1a1a; position:relative; overflow:hidden; }
        .slide-progress-bar {
            height:100%; background:#ff4d00; position:absolute; left:0; top:0;

        }

        /* 이벤트 타입 레이블 */
        .event-type-chip {
            display:inline-flex; align-items:center; gap:5px;
            padding:4px 10px; border-radius:4px; font-size:10px; font-weight:800;

        }

        /* CTA 버튼 그라디언트 */
        .cta-gradient {
            border:none; color:#fff; padding:13px 28px; border-radius:5px;

        .slider-arrow {
            position:absolute; top:50%; transform:translateY(-50%);
